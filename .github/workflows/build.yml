name: Build firmware (PlatformIO)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'
      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          python -m pip install -U platformio
      - name: Build (skr_mini_e3_v3) - try
        run: |
          set -e
          python -m platformio run -e skr_mini_e3_v3 || true

      - name: Build (generic_stm32) - fallback
        run: |
          python -m platformio run -e generic_stm32

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-artifacts
          path: |
            .pio/build/skr_mini_e3_v3/firmware.bin
            .pio/build/generic_stm32/firmware.bin
