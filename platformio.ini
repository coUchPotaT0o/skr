; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:btt_ebb42_v1_1]
platform = ststm32
board = btt_ebb42_v1_1
framework = arduino

; Example environment for SKR Mini E3 V3.
; Replace `genericSTM32F103C8` with the exact PlatformIO board id for your SKR Mini E3 V3
; (if PlatformIO has it, e.g. `btt_skr_mini_e3_v3`), otherwise keep a matching STM32 F1/F4 board.
[env:skr_mini_e3_v3]
platform = ststm32
board = btt_skr_mini_e3_v3
framework = arduino
lib_deps =
	olikraus/U8g2@^2.27.12
	arduino-libraries/Encoder@^1.6.1
	theyosh/Ticker@^1.1.0
; Board set to `btt_skr_mini_e3_v3`. If your PlatformIO doesn't recognize this id,
; change `board` to the exact id reported by `platformio boards` on your machine.
